# Postiz self-hosted on Zo. Secrets come from deploy/postiz/.env (gitignored):
#   POSTIZ_JWT_SECRET, POSTIZ_PG_PASSWORD, POSTIZ_PUBLIC_URL,
#   YOUTUBE_CLIENT_ID, YOUTUBE_CLIENT_SECRET, FACEBOOK_APP_ID, FACEBOOK_APP_SECRET
# Before first `docker compose up`, diff against the current compose in
# https://docs.postiz.com/installation/docker-compose — Postiz env vars drift
# between releases. Pin `image:` to the latest release tag found there.
services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: always
    environment:
      MAIN_URL: ${POSTIZ_PUBLIC_URL}
      FRONTEND_URL: ${POSTIZ_PUBLIC_URL}
      NEXT_PUBLIC_BACKEND_URL: ${POSTIZ_PUBLIC_URL}/api
      JWT_SECRET: ${POSTIZ_JWT_SECRET}
      DATABASE_URL: postgresql://postiz:${POSTIZ_PG_PASSWORD}@postiz-postgres:5432/postiz
      REDIS_URL: redis://postiz-redis:6379
      BACKEND_INTERNAL_URL: http://localhost:3000
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"   # flip to "true" right after Ted registers
      STORAGE_PROVIDER: local
      UPLOAD_DIRECTORY: /uploads
      NEXT_PUBLIC_UPLOAD_DIRECTORY: /uploads
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
    volumes:
      - postiz-config:/config
      - postiz-uploads:/uploads
    ports:
      - "5000:5000"
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
  postiz-postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTIZ_PG_PASSWORD}
      POSTGRES_USER: postiz
      POSTGRES_DB: postiz
    volumes:
      - postiz-db:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postiz -d postiz
      interval: 10s
      timeout: 3s
      retries: 3
  postiz-redis:
    image: redis:7.2-alpine
    restart: always
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-redis-data:/data
volumes:
  postiz-db:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
