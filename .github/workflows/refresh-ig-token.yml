name: Refresh IG Token
on:
  schedule:
    - cron: '0 9 5 * *'   # 5th of each month — well inside the 60-day window
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Refresh and rotate the secret
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          NEW_TOKEN=$(python scripts/refresh_ig_token.py)
          gh secret set IG_ACCESS_TOKEN --body "$NEW_TOKEN" --repo ${{ github.repository }}
      # Dead-man's-switch heartbeat (UsefulMath spec 2026-07-24): exactly one ping
      # per run, success or /fail; must never fail the job (|| true).
      - name: Heartbeat
        if: always()
        run: >
          curl -fsS -m 10 --retry 3
          "https://hc-ping.com/${{ secrets.HEALTHCHECK_PING_KEY }}/ig-token-refresh${{ job.status != 'success' && '/fail' || '' }}"
          || true
